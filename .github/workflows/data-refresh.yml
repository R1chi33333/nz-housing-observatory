name: Data refresh

on:
  schedule:
    # 03:17 UTC on the 5th of each month: HUD and MBIE both publish
    # early in the month, and an off-peak minute is kind to their hosts.
    - cron: '17 3 5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        # xvfb gives the headed Chrome that the rent source's bot
        # challenge requires a display to run against.
        run: xvfb-run -a npm run pipeline

      - name: Verify output still passes tests
        run: npm test

      - name: Commit refreshed data
        run: |
          if git diff --quiet public/data/housing.json; then
            echo "No data changes this month."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/housing.json
          git commit -m "chore(data): monthly refresh of housing.json"
          git push
